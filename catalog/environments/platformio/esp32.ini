; =============================================================================
; PlatformIO Configuration - ESP32 Family
; =============================================================================
; Template for Espressif ESP32 based projects
; Copy this file to your project root as platformio.ini and customize as needed
; =============================================================================

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -Wall
    -Wextra
lib_deps =

