; =============================================================================
; PlatformIO Configuration - AVR Family (Arduino)
; =============================================================================
; Template for Atmel AVR / Arduino based projects
; Copy this file to your project root as platformio.ini and customize as needed
; =============================================================================

[env:uno]
platform = atmelavr
board = uno
framework = arduino
monitor_speed = 115200
build_flags =
    -Wall
    -Wextra
lib_deps =

