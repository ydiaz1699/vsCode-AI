; =============================================================================
; PlatformIO Configuration - STM32 Family
; =============================================================================
; Template for STMicroelectronics STM32 based projects
; Copy this file to your project root as platformio.ini and customize as needed
; =============================================================================

[env:bluepill_f103c8]
platform = ststm32
board = bluepill_f103c8
framework = arduino
upload_protocol = stlink
monitor_speed = 115200
build_flags =
    -Wall
    -Wextra
lib_deps =

