; =============================================================================
; PlatformIO Configuration - ESP8266 Family
; =============================================================================
; Template for Espressif ESP8266 based projects
; Copy this file to your project root as platformio.ini and customize as needed
; =============================================================================

[env:d1_mini_pro]
platform = espressif8266
board = d1_mini_pro
framework = arduino
monitor_speed = 115200
build_flags =
    -Wall
    -Wextra
lib_deps =

