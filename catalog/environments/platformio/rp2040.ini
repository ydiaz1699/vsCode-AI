; =============================================================================
; PlatformIO Configuration - RP2040 Family (Raspberry Pi Pico)
; =============================================================================
; Template for Raspberry Pi RP2040 based projects
; Copy this file to your project root as platformio.ini and customize as needed
; =============================================================================

[env:pico]
platform = raspberrypi
board = pico
framework = arduino
monitor_speed = 115200
build_flags =
    -Wall
    -Wextra
lib_deps =

